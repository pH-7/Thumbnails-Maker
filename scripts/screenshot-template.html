<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thumbnail Maker App Store Screenshot</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    .stage {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #111318;
      color: #fff;
      border-top: 18px solid #e62117;
      overflow: hidden;
    }

    .copy { text-align: center; padding: 5.5vh 7vw 0; flex: 0 0 auto; }
    .eyebrow { color: #ff6b63; font-size: 23px; font-weight: 750; margin-bottom: 13px; }
    .headline { font-size: 78px; font-weight: 820; line-height: 1.04; letter-spacing: 0; }
    .sub { margin-top: 18px; color: #d6d9de; font-size: 34px; font-weight: 520; line-height: 1.22; }

    .device-shell {
      position: relative;
      width: 72vw;
      aspect-ratio: 9 / 19.5;
      margin-top: 3.4vh;
      padding: 14px;
      flex: 0 0 auto;
      border-radius: 60px;
      background: #08090b;
      border: 3px solid #343941;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.48);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 0 24px 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #f2f4f7;
      border-radius: 46px;
      color: #17191c;
    }

    .notch {
      position: absolute;
      top: 13px;
      left: 50%;
      width: 31%;
      height: 28px;
      transform: translateX(-50%);
      border-radius: 16px;
      background: #08090b;
      z-index: 2;
    }

    .app-head { padding: 51px 0 3px; text-align: center; font-size: 29px; font-weight: 800; }
    .app-sub { margin-bottom: 14px; text-align: center; color: #697079; font-size: 17px; }

    .result-wrap {
      overflow: hidden;
      flex: 0 0 auto;
      border: 1px solid #d9dee4;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(18, 24, 32, 0.12);
    }
    .result-wrap canvas { display: block; width: 100%; height: auto; }

    .label { margin: 17px 2px 9px; color: #333840; font-size: 18px; font-weight: 730; }
    .chips { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      padding: 8px 13px;
      border: 1px solid #d7dce2;
      border-radius: 7px;
      background: #fff;
      color: #444b53;
      font-size: 16px;
    }
    .chip.active { border-color: #e62117; background: #fff4f3; color: #c91d14; font-weight: 720; }

    .sources { display: flex; gap: 9px; }
    .source {
      flex: 1;
      aspect-ratio: 16 / 9;
      border: 1px solid #d7dce2;
      border-radius: 6px;
      background-position: center;
      background-size: cover;
    }

    .photo-actions { display: flex; gap: 9px; margin-top: 10px; }
    .photo-action {
      flex: 1;
      padding: 10px 8px;
      border: 1px solid #d7dce2;
      border-radius: 7px;
      background: #fff;
      color: #353b43;
      text-align: center;
      font-size: 15px;
      font-weight: 680;
    }
    .photo-action.primary { border-color: #e62117; background: #fff4f3; color: #c91d14; }

    .option-row { display: flex; align-items: center; gap: 13px; padding: 9px 0; color: #363c44; font-size: 17px; }
    .option-row span:first-child { min-width: 112px; }
    .track { position: relative; height: 6px; flex: 1; border-radius: 3px; background: #d9dee4; }
    .track::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 40%; border-radius: 3px; background: #e62117; }
    .track::after { content: ""; position: absolute; left: 40%; top: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); border-radius: 50%; background: #e62117; }
    .toggle { position: relative; width: 48px; height: 29px; margin-left: auto; border-radius: 15px; background: #e62117; }
    .toggle::after { content: ""; position: absolute; top: 3px; right: 3px; width: 23px; height: 23px; border-radius: 50%; background: #fff; }

    .cta { margin-top: auto; padding: 17px; border-radius: 8px; background: #e62117; color: #fff; text-align: center; font-size: 21px; font-weight: 760; }

    body.tablet .copy { padding-top: 4.2vh; }
    body.tablet .headline { font-size: 94px; }
    body.tablet .sub { font-size: 38px; }
    body.tablet .device-shell { width: 72vw; aspect-ratio: 3 / 4; border-radius: 42px; }
    body.tablet .screen { padding: 0 30px 32px; border-radius: 29px; }
    body.tablet .notch { display: none; }
    body.tablet .app-head { padding-top: 27px; font-size: 33px; }
    body.tablet .app-sub { font-size: 19px; margin-bottom: 17px; }
    body.tablet .label { font-size: 21px; margin-top: 19px; }
    body.tablet .chip { font-size: 18px; padding: 9px 15px; }
    body.tablet .photo-action, body.tablet .option-row { font-size: 19px; }
    body.tablet .cta { font-size: 24px; padding: 19px; }
  </style>
</head>
<body>
  <main class="stage">
    <div class="copy">
      <div class="eyebrow">THUMBNAIL MAKER</div>
      <div class="headline" id="headline"></div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="device-shell">
      <div class="screen">
        <div class="notch"></div>
        <div class="app-head">Thumbnail Maker</div>
        <div class="app-sub">Join photos into a 1280 × 720 thumbnail</div>
        <div class="result-wrap" id="resultWrap"></div>
        <div class="label">Layout</div>
        <div class="chips" id="chips"></div>
        <div class="label">Photos</div>
        <div class="sources" id="sources"></div>
        <div class="photo-actions">
          <div class="photo-action primary">Take Photo</div>
          <div class="photo-action">Choose Photos</div>
        </div>
        <div class="label">Options</div>
        <div class="option-row"><span>Gap</span><div class="track"></div></div>
        <div class="option-row"><span>Auto enhance</span><div class="toggle"></div></div>
        <div class="cta">Save to Photos</div>
      </div>
    </div>
  </main>

  <script src="../mobile/thumbnail-engine.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const layout = params.get('layout') || 'auto';
      const count = Number.parseInt(params.get('count') || '4', 10);
      const enhance = params.get('enhance') === '1';
      const deviceKind = params.get('deviceKind') || 'phone';
      document.body.classList.add(deviceKind === 'tablet' ? 'tablet' : 'phone');
      document.getElementById('headline').textContent = params.get('headline') || 'Join your photos';
      document.getElementById('sub').textContent = params.get('sub') || '';

      function loadSourceSheet() {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error('Could not load screenshot source imagery.'));
          image.src = '../store-assets/creator-scenes.png';
        });
      }

      function makeFrame(sheet, index) {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 360;
        const column = index % 3;
        const row = Math.floor(index / 3) % 3;
        const panelWidth = sheet.naturalWidth / 3;
        const panelHeight = sheet.naturalHeight / 3;
        const inset = 4;
        canvas.getContext('2d').drawImage(
          sheet,
          column * panelWidth + inset,
          row * panelHeight + inset,
          panelWidth - inset * 2,
          panelHeight - inset * 2,
          0,
          0,
          canvas.width,
          canvas.height
        );
        return canvas;
      }

      function canvasToImage(canvas) {
        return new Promise((resolve) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.src = canvas.toDataURL('image/jpeg', 0.94);
        });
      }

      function renderChips() {
        const choices = [
          ['auto', 'Auto'], ['1x2', 'Side by side'], ['2x2', '2×2'], ['3x3', '3×3'], ['1x1', 'Single']
        ];
        const chips = document.getElementById('chips');
        choices.forEach(([key, label]) => {
          const chip = document.createElement('div');
          chip.className = `chip${key === layout ? ' active' : ''}`;
          chip.textContent = label;
          chips.appendChild(chip);
        });
      }

      async function build() {
        const sheet = await loadSourceSheet();
        const frames = Array.from({ length: count }, (_, index) => makeFrame(sheet, index));
        const images = await Promise.all(frames.map(canvasToImage));
        const result = ThumbnailEngine.compose({
          images,
          layout,
          delimiterWidth: 18,
          delimiterColor: '#ffffff',
          delimiterTilt: 0,
          enhance
        });
        document.getElementById('resultWrap').appendChild(result);
        renderChips();

        const sources = document.getElementById('sources');
        for (let index = 0; index < Math.min(3, frames.length); index += 1) {
          const source = document.createElement('div');
          source.className = 'source';
          source.style.backgroundImage = `url(${frames[index].toDataURL('image/jpeg', 0.9)})`;
          sources.appendChild(source);
        }

        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        document.body.dataset.ready = '1';
      }

      build().catch((error) => {
        document.body.dataset.error = error.message;
        console.error(error);
      });
    })();
  </script>
</body>
</html>
